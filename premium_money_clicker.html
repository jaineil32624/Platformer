<script>
const AC = new (window.AudioContext || window.webkitAudioContext)();
let sfxVol=0.5, musicVol=0.3, sfxOn=true, musicOn=true;
let musicOsc=null, musicGain=null, musicPlaying=false;

function playTone(freq,dur,type='sine',vol=0.3){
  if(!sfxOn)return;
  try{
    const o=AC.createOscillator();
    const g=AC.createGain();
    o.connect(g);g.connect(AC.destination);
    o.type=type;o.frequency.setValueAtTime(freq,AC.currentTime);
    g.gain.setValueAtTime(vol*sfxVol,AC.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,AC.currentTime+dur);
    o.start();o.stop(AC.currentTime+dur);
  }catch(e){}
}
function playClick(){
  playTone(400,0.05,'sine',0.2);
  setTimeout(()=>playTone(600,0.04,'sine',0.15),30);
}
function playCrit(){
  playTone(800,0.1,'square',0.25);
  setTimeout(()=>playTone(1200,0.15,'sine',0.2),50);
  setTimeout(()=>playTone(1600,0.1,'sine',0.15),100);
}
function playGolden(){
  [523,659,784,1047].forEach((f,i)=>setTimeout(()=>playTone(f,0.2,'sine',0.3),i*60));
}
function playBuy(){
  playTone(523,0.05,'sine',0.2);
  setTimeout(()=>playTone(659,0.05,'sine',0.2),60);
  setTimeout(()=>playTone(784,0.1,'sine',0.25),120);
}
function playPrestige(){
  [262,330,392,523,659,784,1047].forEach((f,i)=>setTimeout(()=>playTone(f,0.4,'sine',0.3),i*80));
}
function startMusic(){
  if(!musicOn||musicPlaying)return;
  try{
    const notes=[261,294,329,349,392,440,494,523];
    let idx=0;
    musicGain=AC.createGain();
    musicGain.gain.value=musicVol*0.3;
    musicGain.connect(AC.destination);
    function playNote(){
      if(!musicPlaying)return;
      const o=AC.createOscillator();
      o.type='triangle';
      o.frequency.value=notes[idx%notes.length];
      const g=AC.createGain();
      g.gain.setValueAtTime(0,AC.currentTime);
      g.gain.linearRampToValueAtTime(musicVol*0.3,AC.currentTime+0.05);
      g.gain.linearRampToValueAtTime(0,AC.currentTime+0.45);
      o.connect(g);g.connect(AC.destination);
      o.start();o.stop(AC.currentTime+0.5);
      idx+=(Math.random()>0.5?1:2);
      setTimeout(playNote,500+Math.random()*200);
    }
    musicPlaying=true;
    playNote();
  }catch(e){}
}
function stopMusic(){musicPlaying=false;}

function fmt(n){
  if(isNaN(n)||n===null)return'$0';
  if(n<1e3)return'$'+n.toFixed(n<10?2:0);
  if(n<1e6)return'$'+(n/1e3).toFixed(2)+'K';
  if(n<1e9)return'$'+(n/1e6).toFixed(2)+'M';
  if(n<1e12)return'$'+(n/1e9).toFixed(2)+'B';
  if(n<1e15)return'$'+(n/1e12).toFixed(2)+'T';
  return'$'+(n/1e15).toFixed(2)+'Qa';
}
function fmtN(n){if(n<1e3)return Math.round(n)+'';if(n<1e6)return(n/1e3).toFixed(1)+'K';return(n/1e6).toFixed(1)+'M';}

function bizCost(b){return Math.floor(b.base*Math.pow(1.15,G.biz[b.id]));}
function bizRate(b){
  if(!G.biz[b.id])return 0;
  let r=b.rate*G.biz[b.id]*G.globalMult*(1+G.investors*0.05);
  let m=1;
  UPGS.forEach(u=>{
    if(!G.upg[u.id])return;
    if(u.type==='biz'&&u.tgt===b.id)m*=u.mult;
    if(u.type==='all')m*=u.mult;
  });
  return r*m;
}
function totalRate(){return BIZ.reduce((s,b)=>s+bizRate(b),0);}
function clickVal(){
  let v=G.clickMult*(1+G.investors*0.05)*(1+G.combo*0.05);
  let m=1;
  UPGS.forEach(u=>{if(G.upg[u.id]&&u.type==='click')m*=u.mult;});
  return v*m;
}
function prestigePts(){return Math.max(0,Math.floor(Math.sqrt(G.totalEarned/1e6)));}

function spawnParticles(x,y,isCrit){
  const count=isCrit?12:6;
  const emojis=['💰','✨','⭐','💫','🪙'];
  for(let i=0;i<count;i++){
    const el=document.createElement('div');
    el.className='coin-particle';
    const angle=(Math.PI*2/count)*i+Math.random()*0.5;
    const dist=40+Math.random()*60;
    el.style.setProperty('--dx',Math.cos(angle)*dist+'px');
    el.style.setProperty('--dy',Math.sin(angle)*dist-40+'px');
    el.style.left=(x-12)+'px';el.style.top=(y-12)+'px';
    el.textContent=emojis[Math.floor(Math.random()*emojis.length)];
    el.style.animationDuration=(0.6+Math.random()*0.4)+'s';
    document.getElementById('root').appendChild(el);
    setTimeout(()=>el.remove(),1100);
  }
}
function spawnFloatText(x,y,txt,cls=''){
  const el=document.createElement('div');
  el.className='float-text'+(cls?' '+cls:'');
  el.style.left=(x-30)+'px';el.style.top=(y-20)+'px';
  el.textContent=txt;
  document.getElementById('root').appendChild(el);
  setTimeout(()=>el.remove(),1300);
}
function flashScreen(color){
  const el=document.getElementById('screenFlash');
  el.style.background=color||'rgba(255,255,255,0.15)';
  el.style.display='block';
  el.style.animation='none';
  requestAnimationFrame(()=>{el.style.animation='flashAnim 0.4s ease-out forwards';});
  setTimeout(()=>{el.style.display='none';},500);
}
function bigFlash(){
  const el=document.getElementById('bigFlash');
  el.style.display='block';
  el.style.animation='none';
  requestAnimationFrame(()=>{el.style.animation='bigFlash 0.6s ease-out forwards';});
  setTimeout(()=>{el.style.display='none';},700);
}

function doClick(e){
  AC.resume();
  if(!musicPlaying&&musicOn)startMusic();
  const now=Date.now();
  const timeSince=now-G.lastClick;
  G.lastClick=now;
  G.totalClicks++;
  if(timeSince<500){G.combo=Math.min(G.combo+1,50);}
  else if(timeSince>1500){G.combo=Math.max(0,G.combo-2);}
  G.maxCombo=Math.max(G.maxCombo,G.combo);
  clearTimeout(G.comboDecay);
  G.comboDecay=setTimeout(()=>{G.combo=0;},2000);

  const isCrit=Math.random()<(0.05+G.combo*0.01);
  const isGolden=Math.random()<0.008;
  let val=clickVal();
  if(isGolden){val*=50;bigFlash();playGolden();showEvent('GOLDEN CLICK! +'+fmt(val),'#fbbf24');}
  else if(isCrit){val*=3+Math.floor(G.combo/5);flashScreen('rgba(251,191,36,0.2)');playCrit();}
  else{playClick();}

  G.money+=val;G.totalEarned+=val;

  const btn=document.getElementById('clickBtn');
  btn.classList.remove('pulse-anim','golden');
  void btn.offsetWidth;
  btn.classList.add(isGolden?'golden':'pulse-anim');

  const rect=btn.getBoundingClientRect();
  const rootRect=document.getElementById('root').getBoundingClientRect();
  const px=e.clientX-rootRect.left;
  const py=e.clientY-rootRect.top;
  spawnParticles(px,py,isCrit||isGolden);
  spawnFloatText(px,py,'+'+fmt(val),isCrit||isGolden?'crit-text':'');
  maybeEvent();checkAchs();updateUI();
}

function buyBiz(id){
  const b=BIZ.find(x=>x.id===id);
  const cost=bizCost(b);
  if(G.money<cost)return;
  G.money-=cost;G.biz[id]++;
  playBuy();checkAchs();renderBiz();updateUI();
}
function buyUpg(id){
  const u=UPGS.find(x=>x.id===id);
  if(!u||G.upg[id]||G.money<u.cost)return;
  G.money-=u.cost;G.upg[id]=true;
  playBuy();renderUpg();updateUI();
}
function doPrestige(){
  const pts=prestigePts();
  if(pts<1)return;
  if(!confirm(`Prestige for ${pts} Investor${pts>1?'s':''}? All progress resets for a permanent +${pts*5}% bonus.`))return;
  playPrestige();bigFlash();
  G.investors+=pts;G.prestiges++;
  G.money=0;G.combo=0;G.globalMult=1;G.clickMult=1;
  BIZ.forEach(b=>{G.biz[b.id]=0;G.bizProg[b.id]=0;});
  UPGS.forEach(u=>{G.upg[u.id]=false;});
  showEvent('PRESTIGE! Earned '+pts+' investor'+( pts>1?'s':'')+'!','#c4b5fd');
  renderAll();updateUI();
}

let eventCooldown=0;
function maybeEvent(){
  if(Date.now()<eventCooldown)return;
  const r=Math.random();
  if(r<0.004){
    const bonus=clickVal()*30*(2+Math.random()*10);
    G.money+=bonus;G.totalEarned+=bonus;
    showEvent('Investor Visit! +'+fmt(bonus),'#10b981');
    eventCooldown=Date.now()+25000;
  }else if(r<0.007){
    const m=1.5+Math.random();
    showEvent('Market Surge! ×'+m.toFixed(1)+' for 8s','#fbbf24');
    G.globalMult*=m;setTimeout(()=>{G.globalMult/=m;renderBiz();},8000);
    eventCooldown=Date.now()+20000;
  }else if(r<0.009){
    const lose=G.money*0.04;
    G.money=Math.max(0,G.money-lose);
    showEvent('Market Crash! Lost '+fmt(lose),'#ef4444');
    eventCooldown=Date.now()+20000;
  }
}
function showEvent(msg,color){
  const el=document.getElementById('eventTicker');
  el.textContent=msg;
  el.style.color=color||'#fbbf24';
  el.style.borderColor=color||'#fbbf24';
  setTimeout(()=>{el.textContent='';el.style.color='';el.style.borderColor='';},5000);
}

function checkAchs(){
  ACHS.forEach(a=>{
    if(!G.ach[a.id]&&a.check(G)){
      G.ach[a.id]=true;
      showEvent('Achievement: '+a.n,'#fbbf24');
      if(curTab==='ach')renderAch();
    }
  });
}

let curTab='biz';
function setTab(t){
  curTab=t;
  ['biz','upg','pre','ach','set'].forEach(x=>{
    document.getElementById('t'+x).classList.toggle('active',x===t);
  });
  renderTab();
}
function renderTab(){
  if(curTab==='biz')renderBiz();
  else if(curTab==='upg')renderUpg();
  else if(curTab==='pre')renderPre();
  else if(curTab==='ach')renderAch();
  else if(curTab==='set')renderSet();
}
function renderAll(){renderTab();}

function renderBiz(){
  if(curTab!=='biz')return;
  const c=document.getElementById('tcontent');
  c.innerHTML='';
  BIZ.forEach(b=>{
    const owned=G.biz[b.id];
    const cost=bizCost(b);
    const locked=G.totalEarned<b.unlockAt&&owned===0;
    const rate=bizRate(b);
    const aff=G.money>=cost&&!locked;
    const colors={'Farming':'#84cc16','Manufacturing':'#3b82f6','Technology':'#8b5cf6','Space':'#06b6d4','Interdimensional':'#ec4899'};
    const ic=colors[b.ind]||'#6366f1';
    const div=document.createElement('div');
    div.className='biz-row'+(locked?' locked':'');
    div.innerHTML=`<div class="biz-em">${b.em}</div>
    <div class="biz-body">
      <div class="biz-name">${b.n}<span class="ind-badge" style="background:${ic}22;color:${ic}">${b.ind}</span></div>
      <div class="biz-rate">${owned?fmt(rate)+'/s':b.desc}${locked?' · Unlock at '+fmt(b.unlockAt):''}</div>
      <div class="biz-prog"><div class="biz-prog-fill" id="bp-${b.id}"></div></div>
    </div>
    <div class="biz-count">${owned}</div>
    <button class="buy-btn${aff?' affordable':''}" onclick="buyBiz('${b.id}')" ${locked?'disabled':''} ${!locked&&G.money<cost?'disabled':''}>${fmt(cost)}</button>`;
    c.appendChild(div);
  });
}

function renderUpg(){
  if(curTab!=='upg')return;
  const c=document.getElementById('tcontent');
  c.innerHTML='';
  const vis=UPGS.filter(u=>G.totalEarned>=u.req||G.upg[u.id]);
  if(!vis.length){c.innerHTML='<div style="color:var(--txt3);font-size:12px;text-align:center;padding:30px">Earn more to unlock upgrades</div>';return;}
  vis.sort((a,b)=>G.upg[a.id]-G.upg[b.id]||a.cost-b.cost).forEach(u=>{
    const bought=G.upg[u.id];
    const can=!bought&&G.money>=u.cost;
    const div=document.createElement('div');
    div.className='upg-row'+(bought?' bought':'');
    div.innerHTML=`<div class="upg-icon">${u.em}</div>
    <div class="upg-body">
      <div class="upg-name">${u.n}${bought?' <span style="color:#10b981;font-size:9px">✓ owned</span>':''}</div>
      <div class="upg-desc">${u.desc}</div>
    </div>
    <button class="upg-btn${can?' can':''}" onclick="buyUpg('${u.id}')" ${bought||G.money<u.cost?'disabled':''}>${bought?'✓':fmt(u.cost)}</button>`;
    c.appendChild(div);
  });
}

function renderPre(){
  if(curTab!=='pre')return;
  const pts=prestigePts();
  const c=document.getElementById('tcontent');
  c.innerHTML=`<div class="prestige-box">
    <div class="prestige-title">Prestige System</div>
    <div style="font-size:11px;color:rgba(255,255,255,0.5);margin-top:4px">Reset for permanent Investor bonuses (+5% all production each)</div>
    <div class="prestige-pts">${pts} Investor${pts!==1?'s':''} available</div>
    <div style="font-size:10px;color:rgba(255,255,255,0.4)">Formula: √(Total Earned ÷ $1M)</div>
    <button class="prestige-btn" onclick="doPrestige()" ${pts<1?'disabled':''}>Prestige Now</button>
  </div>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
    <div class="inv-stat"><div class="inv-num">${G.investors}</div><div class="inv-lbl">Total investors</div></div>
    <div class="inv-stat"><div class="inv-num">+${Math.round(G.investors*5)}%</div><div class="inv-lbl">Production bonus</div></div>
    <div class="inv-stat"><div class="inv-num">${G.prestiges}</div><div class="inv-lbl">Prestiges done</div></div>
    <div class="inv-stat"><div class="inv-num">${fmt(G.totalEarned)}</div><div class="inv-lbl">Total earned</div></div>
  </div>`;
}

function renderAch(){
  if(curTab!=='ach')return;
  const c=document.getElementById('tcontent');
  c.innerHTML='';
  ACHS.forEach(a=>{
    const earned=G.ach[a.id];
    const div=document.createElement('div');
    div.className='ach-row'+(earned?' earned':'');
    div.innerHTML=`<div class="ach-icon">${earned?a.em:'🔒'}</div><div><div class="ach-name">${a.n}</div><div class="ach-desc">${a.desc}</div></div>`;
    c.appendChild(div);
  });
}

function renderSet(){
  const c=document.getElementById('tcontent');
  c.innerHTML=`<div class="settings-panel">
    <div class="setting-row">
      <span class="setting-label">Sound effects</span>
      <button class="toggle-btn${sfxOn?' on':''}" onclick="toggleSfx(this)">${sfxOn?'On':'Off'}</button>
    </div>
    <div class="setting-row">
      <span class="setting-label">SFX volume</span>
      <input type="range" min="0" max="100" value="${Math.round(sfxVol*100)}" step="1" oninput="sfxVol=this.value/100">
    </div>
    <div class="setting-row">
      <span class="setting-label">Background music</span>
      <button class="toggle-btn${musicOn?' on':''}" onclick="toggleMusic(this)">${musicOn?'On':'Off'}</button>
    </div>
    <div class="setting-row">
      <span class="setting-label">Music volume</span>
      <input type="range" min="0" max="100" value="${Math.round(musicVol*100)}" step="1" oninput="musicVol=this.value/100">
    </div>
    <div class="save-row">
      <button onclick="saveGame()">Save game</button>
      <button onclick="if(confirm('Reset all progress?'))resetGame()">Reset game</button>
    </div>
    <div style="font-size:10px;color:rgba(255,255,255,0.3);margin-top:10px;text-align:center">Auto-saves every 30s</div>
  </div>`;
}

function toggleSfx(btn){sfxOn=!sfxOn;btn.textContent=sfxOn?'On':'Off';btn.classList.toggle('on',sfxOn);}
function toggleMusic(btn){musicOn=!musicOn;if(!musicOn)stopMusic();else startMusic();btn.textContent=musicOn?'On':'Off';btn.classList.toggle('on',musicOn);}

function saveGame(){
  try{
    const d={money:G.money,totalEarned:G.totalEarned,totalClicks:G.totalClicks,
      prestiges:G.prestiges,investors:G.investors,clickMult:G.clickMult,maxCombo:G.maxCombo,
      biz:{...G.biz},upg:{...G.upg},ach:{...G.ach},lastSave:Date.now()};
    localStorage.setItem('moneyclicker_premium',JSON.stringify(d));
  }catch(e){}
}
function loadGame(){
  try{
    const s=localStorage.getItem('moneyclicker_premium');
    if(!s)return;
    const d=JSON.parse(s);
    G.money=d.money||0;G.totalEarned=d.totalEarned||0;G.totalClicks=d.totalClicks||0;
    G.prestiges=d.prestiges||0;G.investors=d.investors||0;G.maxCombo=d.maxCombo||0;
    if(d.biz)Object.assign(G.biz,d.biz);
    if(d.upg)Object.assign(G.upg,d.upg);
    if(d.ach)Object.assign(G.ach,d.ach);
    const offSecs=Math.min((Date.now()-(d.lastSave||Date.now()))/1000,7200);
    if(offSecs>30){
      const earned=totalRate()*offSecs*0.5;
      if(earned>0){G.money+=earned;G.totalEarned+=earned;showEvent('Offline: +'+fmt(earned)+' earned!','#10b981');}
    }
  }catch(e){}
}
function resetGame(){try{localStorage.removeItem('moneyclicker_premium');}catch(e){}location.reload();}

function updateUI(){
  const r=totalRate(),cv=clickVal();
  document.getElementById('moneyDisp').textContent=fmt(G.money);
  document.getElementById('rateDisp').textContent=fmt(r)+'/s passive';
  document.getElementById('clickLbl').textContent='+'+fmt(cv);
  document.getElementById('s1').textContent=fmtN(G.totalClicks);
  document.getElementById('s2').textContent=fmt(G.totalEarned);
  document.getElementById('s3').textContent=G.prestiges;
  document.getElementById('s4').textContent='×'+((1+G.investors*0.05)*G.globalMult).toFixed(2);
  const comboN=G.combo;
  const comboPct=Math.min(comboN/50*100,100);
  document.getElementById('comboBar').style.width=comboPct+'%';
  document.getElementById('comboLabel').textContent=comboN>0?`Combo ×${(1+comboN*0.05).toFixed(1)} (${comboN}/50 hits)`:'Click to earn';
  if(curTab==='biz'){
    document.querySelectorAll('.buy-btn').forEach(btn=>{
      const id=btn.getAttribute('onclick')?.match(/'([^']+)'/)?.[1];
      if(!id)return;
      const b=BIZ.find(x=>x.id===id);
      if(!b)return;
      const cost=bizCost(b);
      const locked=G.totalEarned<b.unlockAt&&G.biz[b.id]===0;
      btn.textContent=fmt(cost);
      btn.disabled=G.money<cost||locked;
      btn.classList.toggle('affordable',G.money>=cost&&!locked);
    });
  }
  if(curTab==='upg'){
    document.querySelectorAll('.upg-btn').forEach(btn=>{
      const id=btn.getAttribute('onclick')?.match(/'([^']+)'/)?.[1];
      if(!id)return;
      const u=UPGS.find(x=>x.id===id);
      if(!u)return;
      const can=!G.upg[u.id]&&G.money>=u.cost;
      btn.disabled=G.upg[u.id]||G.money<u.cost;
      btn.classList.toggle('can',can);
    });
  }
}

let lastFrame=Date.now();
function gameLoop(){
  const now=Date.now(),dt=(now-lastFrame)/1000;lastFrame=now;
  BIZ.forEach(b=>{
    if(!G.biz[b.id])return;
    const rate=bizRate(b);
    G.money+=rate*dt;G.totalEarned+=rate*dt;
    G.bizProg[b.id]=(G.bizProg[b.id]||0)+dt*1000;
    if(G.bizProg[b.id]>=b.cycle)G.bizProg[b.id]-=b.cycle;
    const bar=document.getElementById('bp-'+b.id);
    if(bar)bar.style.width=(G.bizProg[b.id]/b.cycle*100)+'%';
  });
  updateUI();
  requestAnimationFrame(gameLoop);
}

loadGame();
renderAll();
updateUI();
requestAnimationFrame(gameLoop);
setInterval(saveGame,30000);
setInterval(()=>{if(curTab==='pre')renderPre();},5000);
</script>
